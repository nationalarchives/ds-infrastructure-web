          else:
              print(f"[{environment}] IP {new_ip} already exists")

          waf.update_ip_set(
              Name=ip_set_name,
              Scope="CLOUDFRONT",
              Id=ip_set_id,
              Addresses=addresses,
              LockToken=lock_token
          )

          user_ips[user_name] = new_ip

          ssm.put_parameter(
              Name=param_name,
              Value=json.dumps(user_ips, indent=2),
              Type="String",
              Overwrite=True
          )

          print(f"[{environment}] WAF IP set update completed for {ip_set_name}")
          EOF

      - name: Configure AWS credentials for Live
        if: |
          github.event.inputs.ip_set_name == 'wp-admins' ||
          github.event.inputs.ip_set_name == 'wagtail-admins' ||
          github.event.inputs.ip_set_name == 'web-exceptions'
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
        with:
          aws-region: us-east-1
          role-to-assume: arn:aws:iam::968803923593:role/github-oidc-Role-1QSZDDE2NZQV0
          role-session-name: GitHubActions-Live
          audience: sts.amazonaws.com
          output-env-credentials: true

      - name: Update Live WAF IP Set
        if: |
          github.event.inputs.ip_set_name == 'wp-admins' ||
          github.event.inputs.ip_set_name == 'wagtail-admins' ||
          github.event.inputs.ip_set_name == 'web-exceptions'
        env:
          ENVIRONMENT: live
          IP_SET_NAME: ${{ github.event.inputs.ip_set_name }}
          USER_NAME: ${{ github.event.inputs.user_name }}
          NEW_IP: ${{ github.event.inputs.new_ip }}
        run: |
          python3 - <<'EOF'

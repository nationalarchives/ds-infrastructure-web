name: Update IP Sets

on:
  workflow_dispatch:
    inputs:
      user_name:
        description: "Select your name"
        required: true
        type: choice
        options:
          - "-- Select your name --"
          - AJ
          - Allan Fernandes
          - Amy Bayley
          - Andrew Curry
          - Ashley
          - AVD Range
          - Ayo
          - Brian
          - Catherine
          - Charlie Jones
          - Corporate Wifi
          - Elise Wong
          - Gnanesh
          - Gov Wifi
          - Guy Grannum
          - Helen Oake
          - Ian Jenkins
          - Internal AWS IPs
          - James Biggs
          - Jason Stemarthe
          - Julie
          - Karl Kern
          - Lizzy Bullock
          - Maria
          - Matt B
          - Nicola
          - On-prem
          - Pulse VPN
          - Rachel
          - Rose
          - Ruth Roberts
          - Samantha
          - Simon H
          - Simon W
          - Sophie Glickman
          - Steven Hirschorn
          - tna dblclk
          - TNA Wifi
          - Torch Box
          - Vaishnavi
          - VPN Intersite

      ip_set_name:
        description: "Select WAF IP set"
        required: true
        type: choice
        options:
          - web-access
          - web-exceptions
          - wp-admins
          - wagtail-admins

      new_ip:
        description: "Enter your new IP/CIDR (e.g., 203.0.113.5/32)"
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  update-web-ip-sets:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@7f4fc3e22c37d6ff65e88745f38bd3157c663f7c # v4.9.1
        with:
          python-version: "3.13"

      - name: Install boto3
        run: pip install boto3

      - name: Validate selected inputs
        run: |
          if [ "${{ github.event.inputs.user_name }}" = "-- Select your name --" ]; then
            echo "Please select a valid user name"
            exit 1
          fi

      - name: Configure AWS credentials for Dev
        if: |
          github.event.inputs.ip_set_name == 'web-access' ||
          github.event.inputs.ip_set_name == 'wp-admins' ||
          github.event.inputs.ip_set_name == 'wagtail-admins'
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
        with:
          aws-region: us-east-1
          role-to-assume: arn:aws:iam::846769538626:role/GithubOIDCProviderIAMRolePermissions-Role-I80RXHT6O1PL
          role-session-name: GitHubActions-Dev
          audience: sts.amazonaws.com
          output-env-credentials: true

      - name: Update Dev WAF IP Set
        if: |
          github.event.inputs.ip_set_name == 'web-access' ||
          github.event.inputs.ip_set_name == 'wp-admins' ||
          github.event.inputs.ip_set_name == 'wagtail-admins'
        env:
          ENVIRONMENT: dev
          IP_SET_NAME: ${{ github.event.inputs.ip_set_name }}
          USER_NAME: ${{ github.event.inputs.user_name }}
          NEW_IP: ${{ github.event.inputs.new_ip }}
        run: |
          python3 - <<'EOF'
          import boto3
          import json
          import ipaddress
          import os

          environment = os.environ["ENVIRONMENT"]
          ip_set_name = os.environ["IP_SET_NAME"].strip()
          user_name = os.environ["USER_NAME"].strip()
          new_ip = os.environ["NEW_IP"].strip()

          try:
              ipaddress.ip_network(new_ip, strict=False)
          except ValueError:
              raise Exception(f"Invalid IP/CIDR entered: {new_ip}")

          waf = boto3.client("wafv2", region_name="us-east-1")
          ssm = boto3.client("ssm", region_name="eu-west-2")

          paginator = waf.get_paginator("list_ip_sets")
          matching_ip_sets = []

          for page in paginator.paginate(Scope="CLOUDFRONT"):
              matching_ip_sets.extend(
                  ip_set for ip_set in page["IPSets"]
                  if ip_set["Name"] == ip_set_name
              )

          if not matching_ip_sets:
              raise Exception(f"[{environment}] IP set not found: {ip_set_name}")

          ip_set_id = matching_ip_sets[0]["Id"]
          param_name = f"/waf/{ip_set_name}/user-ips/{environment}"

          try:
              param = ssm.get_parameter(Name=param_name)
              user_ips = json.loads(param["Parameter"]["Value"])
          except ssm.exceptions.ParameterNotFound:
              user_ips = {}

          old_ip = user_ips.get(user_name)

          resp = waf.get_ip_set(
              Name=ip_set_name,
              Scope="CLOUDFRONT",
              Id=ip_set_id
          )

          lock_token = resp["LockToken"]
          addresses = resp["IPSet"]["Addresses"]

          if old_ip and old_ip in addresses:
              addresses.remove(old_ip)
              print(f"[{environment}] Removed old IP for {user_name}: {old_ip}")

          if new_ip not in addresses:
              addresses.append(new_ip)
              print(f"[{environment}] Added new IP for {user_name}: {new_ip}")
          else:
              print(f"[{environment}] IP {new_ip} already exists")

          waf.update_ip_set(
              Name=ip_set_name,
              Scope="CLOUDFRONT",
              Id=ip_set_id,
              Addresses=addresses,
              LockToken=lock_token
          )

          user_ips[user_name] = new_ip

          ssm.put_parameter(
              Name=param_name,
              Value=json.dumps(user_ips, indent=2),
              Type="String",
              Overwrite=True
          )

          print(f"[{environment}] WAF IP set update completed for {ip_set_name}")
          EOF

      - name: Configure AWS credentials for Staging
        if: |
          github.event.inputs.ip_set_name == 'web-access' ||
          github.event.inputs.ip_set_name == 'wp-admins' ||
          github.event.inputs.ip_set_name == 'wagtail-admins'
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
        with:
          aws-region: us-east-1
          role-to-assume: arn:aws:iam::337670467269:role/GitHubActionRole

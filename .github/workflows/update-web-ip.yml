name: Update Web IP

on:
  workflow_dispatch:
    inputs:
      user_name:
        description: "Select your name"
        required: true
        type: choice
        options:
          - "-- Select your name --"
          - AJ
          - Allan
          - Andrew Curry
          - Ashley
          - Ayo
          - Brian
          - Catherine
          - Charlie
          - Elise
          - Gnanesh
          - Guy
          - Helen
          - James
          - Jason
          - Julie
          - Karl
          - Lizzy
          - Maria
          - Matt
          - Nicola
          - Rachel
          - Rose
          - Ruth
          - Samantha
          - Simon H
          - Simon W
          - Sophie
          - Steven
          - Vaishnavi

      new_ip:
        description: "Enter your new IP/CIDR (e.g., 203.0.113.5/32)"
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  update-web-ip-sets:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@7f4fc3e22c37d6ff65e88745f38bd3157c663f7c # v4.9.1
        with:
          python-version: "3.13"

      - name: Install boto3
        run: pip install boto3

      - name: Update WAF IP Set for Dev
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
        with:
          aws-region: us-east-1
          role-to-assume: arn:aws:iam::846769538626:role/GithubOIDCProviderIAMRolePermissions-Role-I80RXHT6O1PL
          role-session-name: GitHubActions-Dev
          audience: sts.amazonaws.com
          output-env-credentials: true

      - name: Update WAF IP Set for Dev Environment
        run: |
          python3 - <<'EOF'
          import boto3
          import json
          import ipaddress

          user_name = '${{ github.event.inputs.user_name }}'.strip()
          new_ip = '${{ github.event.inputs.new_ip }}'.strip()

          ip_set_name = 'wp-website-access'
          ip_set_id = '058768bc-eb34-41ba-82e8-3a2e0768184b'
          param_name = '/waf/wp-website-access/user-ips/dev'

          try:
              ipaddress.ip_network(new_ip, strict=False)
          except ValueError:
              raise Exception(f"Invalid IP/CIDR entered: {new_ip}")

          waf = boto3.client('wafv2', region_name='us-east-1')
          ssm = boto3.client('ssm', region_name='eu-west-2')

          try:
              param = ssm.get_parameter(Name=param_name)
              user_ips = json.loads(param['Parameter']['Value'])
          except ssm.exceptions.ParameterNotFound:
              user_ips = {}

          old_ip = user_ips.get(user_name)

          resp = waf.get_ip_set(
              Name=ip_set_name,
              Scope='CLOUDFRONT',
              Id=ip_set_id
          )

          lock_token = resp['LockToken']
          addresses = resp['IPSet']['Addresses']

          if old_ip and old_ip in addresses:
              addresses.remove(old_ip)
              print(f"[Dev] Removed old IP for {user_name}: {old_ip}")

          if new_ip not in addresses:
              addresses.append(new_ip)
              print(f"[Dev] Added new IP for {user_name}: {new_ip}")
          else:
              print(f"[Dev] IP {new_ip} already exists")

          waf.update_ip_set(
              Name=ip_set_name,
              Scope='CLOUDFRONT',
              Id=ip_set_id,
              Addresses=addresses,
              LockToken=lock_token
          )

          user_ips[user_name] = new_ip

          ssm.put_parameter(
              Name=param_name,
              Value=json.dumps(user_ips, indent=2),
              Type='String',
              Overwrite=True
          )

          print("[Dev] WAF IP set update completed")
          EOF

      - name: Update WAF IP Set for Staging
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
        with:
          aws-region: us-east-1
          role-to-assume: arn:aws:iam::337670467269:role/GitHubActionRole
          role-session-name: GitHubActions-Staging
          audience: sts.amazonaws.com
          output-env-credentials: true

      - name: Update WAF IP Set for Staging Environment
        run: |
          python3 - <<'EOF'
          import boto3
          import json
          import ipaddress

          user_name = '${{ github.event.inputs.user_name }}'.strip()
          new_ip = '${{ github.event.inputs.new_ip }}'.strip()

          ip_set_name = 'wp-website-access'
          ip_set_id = 'eb3183da-cb52-4788-8d0d-00bed2675808'
          param_name = '/waf/wp-website-access/user-ips/staging'

          try:
              ipaddress.ip_network(new_ip, strict=False)
          except ValueError:
              raise Exception(f"Invalid IP/CIDR entered: {new_ip}")

          waf = boto3.client('wafv2', region_name='us-east-1')
          ssm = boto3.client('ssm', region_name='eu-west-2')

          try:
              param = ssm.get_parameter(Name=param_name)
              user_ips = json.loads(param['Parameter']['Value'])
          except ssm.exceptions.ParameterNotFound:
              user_ips = {}

          old_ip = user_ips.get(user_name)

          resp = waf.get_ip_set(
              Name=ip_set_name,
              Scope='CLOUDFRONT',
              Id=ip_set_id
          )

          lock_token = resp['LockToken']
          addresses = resp['IPSet']['Addresses']

          if old_ip and old_ip in addresses:
              addresses.remove(old_ip)
              print(f"[Staging] Removed old IP for {user_name}: {old_ip}")

          if new_ip not in addresses:
              addresses.append(new_ip)
              print(f"[Staging] Added new IP for {user_name}: {new_ip}")
          else:
              print(f"[Staging] IP {new_ip} already exists")

          waf.update_ip_set(
              Name=ip_set_name,
              Scope='CLOUDFRONT',
              Id=ip_set_id,
              Addresses=addresses,
              LockToken=lock_token
          )

          user_ips[user_name] = new_ip

          ssm.put_parameter(
              Name=param_name,
              Value=json.dumps(user_ips, indent=2),
              Type='String',
              Overwrite=True
          )

          print("[Staging] WAF IP set update completed")
          EOF

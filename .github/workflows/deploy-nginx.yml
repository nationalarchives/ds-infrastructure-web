---
name: Nginx Config Deploy

permissions:
  id-token: write
  contents: write

on:
  workflow_call:
    inputs:
      deploy-environment:
        type: string
        required: true
      nginx_version:
        type: string
        required: true
      github-environment:
        type: string
        required: true
      account_id:
        type: string
        required: true
      role-to-assume:
        type: string
        required: true
      config-bucket:
        type: string
        required: true
      branch:
        type: string
        required: false
        default: ""


jobs:
  terraform-apply-nginx:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      environment: "${{ inputs.deploy-environment }}"
      working-directory: components/terraform
      account_id: "${{ inputs.account_id }}"
      region: eu-west-2
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
        with:
          aws-region: eu-west-2
          role-to-assume: "${{ inputs.role-to-assume }}"
          role-session-name: github-actions-session

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.11' # Version range or exact version of a Python version to use, using SemVer's version range syntax
          architecture: 'x64' # optional x64 or x86. Defaults to x64 if not specified

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.branch }}
          persist-credentials: false

      - uses: hashicorp/setup-terraform@633666f66e0061ca3b725c73b2ec20cd13a8fdd1 # v2.0.3

      - name: Check Python
        run: |
          python --version

      - name: Create Backend S3 Bucket
        run: |
          if 
           aws s3 ls "s3://ds-terraform-state-${{ env.region }}-${{ env.account_id }}" 2>&1 | grep -q 'NoSuchBucket' 
          then 
           aws s3api create-bucket \
              --bucket ds-terraform-state-${{ env.region }}-${{ env.account_id }} \
              --region ${{ env.region }} \
              --create-bucket-configuration LocationConstraint=${{ env.region }}
          
           aws s3api put-public-access-block \
              --bucket ds-terraform-state-${{ env.region }}-${{ env.account_id }} \
              --public-access-block-configuration "BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true"
          else
           echo 'Bucket Already Exists'
          fi

      - name: Copy Environment Vars
        run: |
          echo 'test'
          cp ./components/terraform/vars/${{ env.environment }}/* ./components/terraform/

      - name: Terraform init
        id: init
        run: terraform init -upgrade
        working-directory: ${{ env.working-directory }}

      - name: Terraform apply
        id: apply
        run: terraform apply -auto-approve -target module.nginx_conf
        working-directory: ${{ env.working-directory }}
  prepare:
    runs-on: "ubuntu-latest"
    needs:
      - terraform-apply-nginx
    env:
      region: "eu-west-2"
      branch: "${{ inputs.branch }}"
      deploy_env: "${{ inputs.deploy-environment }}"
      config_bucket: "${{ inputs.config-bucket }}"
      nginx_version: "${{ inputs.nginx_version }}"

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
        with:
          role-to-assume: ${{ inputs.role-to-assume }}
          aws-region: "${{ env.region }}"

      - name: run prep script
        env:
          DEPLOY_ENV: "${{ env.deploy_env }}"
          CONFIG_BUCKET: "${{ env.config_bucket }}"
        run: |
          echo "Using nginx version: $nginx_version"
          mkdir payload
          aws s3 cp s3://$config_bucket/web/nginx/$nginx_version/ payload/ \
            --recursive \
            --exclude "*" \
            --include "*.conf" \
            --include "mime.types"

          # appspec
          cat <<EOF > appspec.yml
          version: 0.0
          os: linux
          files:
            - source: /payload
              destination: /payload
          hooks:
            AfterInstall:
              - location: deploy-nginx.sh
                timeout: 120
          EOF

          # deploy script (MAIN LOGIC)
          cat <<EOF > deploy-nginx.sh
          #!/bin/bash
          set -e

          VERSION="${nginx_version}"

          echo "Deploying version: \$VERSION"

          # create version directory
          mkdir -p /etc/nginx/\$VERSION

          # copy configs
          cp -r /payload/* /etc/nginx/\$VERSION/

          # update symlink
          ln -sfn /etc/nginx/\$VERSION /etc/nginx/current

          echo "Symlink switched to: \$VERSION"
          
          echo "Running startup.sh..."
          bash /usr/local/bin/startup.sh

          echo "Deployment completed successfully"
          EOF

          chmod +x deploy-nginx.sh

          mkdir deployment
          mv payload deployment/
          mv appspec.yml deployment/
          mv deploy-nginx.sh deployment/

          cd deployment
          zip -r ../deployment.zip .

          aws s3 cp ../deployment.zip \
            s3://ds-$deploy_env-deployment-source/web/nginx-deployment/web-nginx-conf.zip

         
  deploy:
    runs-on: "ubuntu-latest"
    needs:
      - prepare
    env:
      user: "${{ github.actor }}"
      deploy_env: "${{ inputs.deploy-environment }}"
      region: "eu-west-2"
    environment: "${{ inputs.github-environment }}"
    steps:
      - name: Checkout ds-infrastructure-web
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: nationalarchives/ds-infrastructure-web
          persist-credentials: false

      - name: copy script
        run: |
          cp scripts/requirements-aws-cli.txt .

      - name: Install AWS CLI
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: '**/requirements-aws-cli.txt'

      - name: Install python dependencies
        run: |
          pip install -r scripts/requirements-aws-cli.txt

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
        with:
          role-to-assume: ${{ inputs.role-to-assume }}
          aws-region: "${{ env.region }}"

      - name: Deploy
        env:
          user: "${{ env.user }}"
          deploy_env: "${{ env.deploy_env }}"
        run: |
          echo deploying for $user...
          aws deploy create-deployment --application-name web-nginx-rp --deployment-config-name web-nginx-rp --deployment-group-name web-nginx-rp-group --s3-location bucket=ds-$deploy_env-deployment-source,bundleType=zip,key=web/nginx-deployment/web-nginx-conf.zip | tee id.txt
          x=$(cut id.txt -d '"' -f 4 -s)
          echo "Waiting for successful deployment..."
          aws deploy wait deployment-successful --deployment-id $x
          echo "Successfully deployed!"

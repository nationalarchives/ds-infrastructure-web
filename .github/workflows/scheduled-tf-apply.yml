name: TF scheduled apply infrastructure

on:
  schedule:
    - cron: '10 15 * * 5'
  workflow_dispatch:

permissions:
  id-token: write
  contents: write

jobs:
  terraform:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - account: dev
            role: arn:aws:iam::846769538626:role/GithubOIDCProviderIAMRolePermissions-Role-I80RXHT6O1PL
            environment: dev

          # - account: staging
          #   role: arn:aws:iam::337670467269:role/GitHubActionRole
          #   environment: staging

          # - account: live
          #   role: arn:aws:iam::968803923593:role/github-oidc-Role-1QSZDDE2NZQV0
          #   environment: production

    environment: ${{ matrix.environment }}

    env:
      working_dir: components/terraform

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
        with:
          aws-region: eu-west-2
          role-to-assume: ${{ matrix.role }}
          role-session-name: MySessionName

      - name: Setup runner
        uses: ./.github/actions/setup-runtime

      # ---------------- PLAN ----------------
      - name: Terraform Plan
        uses: ./.github/actions/terraform-plan
        with:
          account: ${{ matrix.account }}

      # ---------------- SLACK ----------------
      - name: Get Slack credentials
        uses: aws-actions/aws-secretsmanager-get-secrets@a9a7eb4e2f2871d30dc5b892576fde60a2ecc802 # v2.0.10
        with:
          secret-ids: |
            ,infrastructure/ds-infrastructure-notifications/slack
          parse-json-secrets: true

      - name: Slack notify
        uses: slackapi/slack-github-action@b0fa283ad8fea605de13dc3f449259339835fc52 # v2.1.0
        with:
          method: chat.postMessage
          token: ${{ env.SLACK_BOT_TOKEN }}
          payload: |
            channel: ${{ env.SLACK_CHANNEL_ID }}
            text: ":warning: *${{ matrix.account }} Terraform plan completed*\nApproval required before APPLY\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      # ---------------- APPLY ----------------
      - name: Terraform Apply
        uses: ./.github/actions/terraform-apply
        with:
          account: ${{ matrix.account }}

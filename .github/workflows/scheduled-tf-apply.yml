name: TF scheduled infrastructure

on:
  schedule:
    - cron: '05 14 * * 5'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  working_dir: components/terraform

jobs:

# =========================
# DEV
# =========================
  dev:
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
        with:
          aws-region: eu-west-2
          role-to-assume: arn:aws:iam::846769538626:role/GithubOIDCProviderIAMRolePermissions-Role-I80RXHT6O1PL

      - name: Setup runtime
        uses: ./.github/actions/setup-runtime

      - name: Terraform Init
        run: |
          cd $working_dir
          terraform init -input=false

      - name: Terraform Plan
        run: |
          cd $working_dir
          terraform plan -out=tfplan

      # ---------------- SLACK ----------------
      - name: Get Slack credentials
        uses: aws-actions/aws-secretsmanager-get-secrets@a9a7eb4e2f2871d30dc5b892576fde60a2ecc802 # v2.0.10
        with:
          secret-ids: |
            ,infrastructure/ds-infrastructure-notifications/slack
          parse-json-secrets: true

      - name: Slack notify
        uses: slackapi/slack-github-action@b0fa283ad8fea605de13dc3f449259339835fc52 # v2.1.0
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel: ${{ secrets.SLACK_CHANNEL_ID }}
            text: |
              🟢 DEV Terraform plan completed
              👉 Please approve in GitHub UI

      - name: Terraform Apply
        run: |
          cd $working_dir
          terraform apply -auto-approve tfplan


# =========================
# STAGING
# =========================
  staging:
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: AWS STAGING auth
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: eu-west-2
          role-to-assume: arn:aws:iam::337670467269:role/GitHubActionRole

      - name: Setup runtime
        uses: ./.github/actions/setup-runtime

      - name: Terraform Init
        run: |
          cd $working_dir
          terraform init -input=false

      - name: Terraform Plan
        run: |
          cd $working_dir
          terraform plan -out=tfplan

      - name: Slack Notify (STAGING)
        uses: slackapi/slack-github-action@v2.1.0
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel: ${{ secrets.SLACK_CHANNEL_ID }}
            text: |
              ⚠️ STAGING Terraform plan completed
              👉 Awaiting GitHub approval

      - name: Terraform Apply
        run: |
          cd $working_dir
          terraform apply -auto-approve tfplan


# =========================
# LIVE
# =========================
  live:
    runs-on: ubuntu-latest
    environment: live

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: AWS LIVE auth
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: eu-west-2
          role-to-assume: arn:aws:iam::968803923593:role/github-oidc-Role-1QSZDDE2NZQV0

      - name: Setup runtime
        uses: ./.github/actions/setup-runtime

      - name: Terraform Init
        run: |
          cd $working_dir
          terraform init -input=false

      - name: Terraform Plan
        run: |
          cd $working_dir
          terraform plan -out=tfplan

      - name: Slack Notify (LIVE)
        uses: slackapi/slack-github-action@v2.1.0
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel: ${{ secrets.SLACK_CHANNEL_ID }}
            text: |
              🚨 LIVE Terraform plan completed
              👉 Awaiting GitHub approval

      - name: Terraform Apply
        run: |
          cd $working_dir
          terraform apply -auto-approve tfplan

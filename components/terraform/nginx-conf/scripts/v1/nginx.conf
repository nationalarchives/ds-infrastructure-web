# For more information on configuration, see:
#   * Official English Documentation: http://nginx.org/en/docs/

user nginx;
worker_processes auto;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    # ----------------------------------------------------------------------
    # ds-dev: 10.128.32.2; ds-test: 10.128.40.2; ds-live: 10.128.48.2;
    resolver ${resolver} ipv6=off;
    # ----------------------------------------------------------------------

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for" '
                      '-- uri: "$uri" -- request_uri "$request_uri"';

    sendfile            on;
    sendfile_max_chunk  1m;

    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    types_hash_max_size 4096;
    client_max_body_size 100M;

    variables_hash_max_size     2048;
    variables_hash_bucket_size  128;

    include             /etc/nginx/mime.types;
    default_type        application/octet-stream;

    include /etc/nginx/conf.d/*.conf;

    map_hash_bucket_size 256;

    # --------
    # mapping on-prem IPs as valid;
    map $remote_addr $onprem {
        # public on-prem IP
        137.221.134.222 "yes";
        default "no";
    }

    map $uri $redirect_uri {
        include redirects.conf;
    }
    map $uri/ $redirect_uri_slash {
        include redirects.conf;
    }

    ## wagtail server
    include wagtail_admin.conf;
    limit_req_zone $binary_remote_addr zone=one:10m rate=40r/s;

    server {
        listen 80;
        server_name live-www.nationalarchives.gov.uk;
        # Redirect all HTTP requests to canonical www
        return 301 https://www.nationalarchives.gov.uk$request_uri;
        }

    server {
        limit_req zone=one burst=60 nodelay;
        listen 80 default_server;
        server_name     %{ if environment == "live" }www.nationalarchives.gov.uk nationalarchives.gov.uk%{ else }${environment}-www.nationalarchives.gov.uk%{ endif };
        server_tokens   off;
        access_log  /var/log/nginx/public-access.log  main;
        error_log   /var/log/nginx/public-error.log;

        set_real_ip_from ${set_real_ip_from};
        real_ip_header X-Forwarded-For;
        real_ip_recursive on;

        include cloudfront_ips.conf;
        include variables.conf;

        gzip         on;
        gzip_proxied expired no-cache no-store private auth;
        gzip_types   *;

        # aws efs - static content delivered from nginx directly
        root /var/nationalarchives.gov.uk;

        add_header Referrer-Policy          "no-referrer-when-downgrade" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload";
        %{ if environment != "live" }
        add_header X-Robots-Tag "noindex, nofollow, nosnippet, noarchive";
        %{ endif }

        proxy_intercept_errors          on;
        proxy_buffering                 off;
        proxy_buffer_size               4k;
        proxy_http_version              1.1;
        proxy_redirect                  off;

        proxy_headers_hash_max_size     2048;
        proxy_headers_hash_bucket_size  256;

        proxy_pass_request_headers  on;
        proxy_pass_request_body     on;

        proxy_set_header Host                   $proxy_host;
        proxy_set_header X-Forwarded-For        $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP              $remote_addr;
        proxy_set_header X-Forwarded-Host       $host;
        proxy_set_header X-Forwarded-Proto      $scheme;

        proxy_set_header HTTP_X_FORWARDED_PROTO  $scheme;
        proxy_set_header HTTP_X_FORWARDED_HOST  $host;
        proxy_set_header X_HOST_TYPE            "public";
        proxy_set_header X-NginX-Proxy          true;
        proxy_set_header Accept-Encoding        "";

        ssi on;
        ssi_last_modified on;
 
        index index.php default.htm default.html index.htm index.html;

        # sub_filter_once off;
        # sub_filter livelb.nationalarchives.gov.uk   https://$base_url;
        # subs_filter_types application/rss+xml;
        # subs_filter (https?:)(\/\/|\\\/\\\/)([-a-zA-Z0-9]*)(\.${environment}lb\.nationalarchives\.gov\.uk) https://$base_url gir;

        # subs_filter (\/\/|\\\/\\\/)(web-frontend\.${environment}\.local) //$base_url gir;
        # subs_filter (\/\/|\\\/\\\/)(web-enrichment\.${environment}\.local) //$base_url gir;
        # subs_filter (https?:)(\/\/|\\\/\\\/)(www\.nationalarchives\.gov\.uk) https://$base_url gir;
        # subs_filter (https?:)(\/\/|\\\/\\\/)(nationalarchives\.gov\.uk) https://$base_url gir;
    }
    
# For more information on configuration, see:
#   * Official English Documentation: http://nginx.org/en/docs/

user nginx;
worker_processes auto;
pid /run/nginx.pid;

# Load dynamic modules. See /usr/share/doc/nginx/README.dynamic.
#include /usr/share/nginx/modules/*.conf;

events {
    worker_connections 1024;
}

http {
    # ----------------------------------------------------------------------
    # ds-dev: 10.128.32.2; ds-test: 10.128.40.2; ds-live: 10.128.48.2;
    resolver ${resolver} ipv6=off;
    # ----------------------------------------------------------------------

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for" '
                      '-- uri: "$uri" -- request_uri "$request_uri"';

    sendfile            on;
    sendfile_max_chunk  1m;

    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    types_hash_max_size 4096;
    client_max_body_size 100M;

    variables_hash_max_size     2048;
    variables_hash_bucket_size  128;

    include mime.types;
    default_type        application/octet-stream;

    include wp_admin.conf;                # admin site    
    include blog.conf;                    # blog site    
    include media.conf;                   # media site    
    include wp_admin_subdomain.conf;      # subdomain sites 
    include wagtail_admin.conf;           # wagtail site
    map_hash_bucket_size 256;
    # --------
    # mapping on-prem IPs as valid;
    map $remote_addr $onprem {
        # public on-prem IP
        137.221.134.222 "yes";
        default "no";
    }

    map $uri $redirect_uri {
        include redirects.conf;
    }
    map $uri/ $redirect_uri_slash {
        include redirects.conf;
    }

    limit_req_zone $binary_remote_addr zone=one:10m rate=40r/s;


    server {
        listen 80;
        server_name live-www.nationalarchives.gov.uk;
        # Redirect all HTTP requests to canonical www
        return 301 https://www.nationalarchives.gov.uk$request_uri;
    }

    # publicly accessible website
    server {
        limit_req zone=one burst=60 nodelay;

        listen          80 default_server;
        server_name     %{ if environment == "live" }www.nationalarchives.gov.uk nationalarchives.gov.uk%{ else }${environment}-www.nationalarchives.gov.uk%{ endif };
        server_tokens   off;

        access_log  /var/log/nginx/public-access.log  main;
        error_log   /var/log/nginx/public-error.log;

        set_real_ip_from ${set_real_ip_from};
        real_ip_header X-Forwarded-For;
        real_ip_recursive on;

        include cloudfront_ips.conf;
        include web-frontend.conf;            # web-frontend conf file
        include web-enrichment.conf;          # web-enrichment conf file
        include web-forms.conf;               # Forms conf file
         include web-hosprec.conf;             # web-hosprec conf file

        gzip         on;
        gzip_proxied expired no-cache no-store private auth;
        gzip_types   *;

        # aws efs - static content delivered from nginx directly
        root /var/nationalarchives.gov.uk;

        add_header Referrer-Policy          "no-referrer-when-downgrade" always;
        #add_header X-Content-Type-Options   "nosniff";
        #add_header Content-Security-Policy  "frame-ancestors 'self'";
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload";
        %{ if environment != "live" }
        add_header X-Robots-Tag "noindex, nofollow, nosnippet, noarchive";
        %{ endif }

        #add_header Content-Security-Policy "default-src 'self' nationalarchives.gov.uk *.nationalarchives.gov.uk fonts.gstatic.com; script-src: 'self' 'unsafe-inline' moz-extension: nationalarchives.gov.uk *.nationalarchives.gov.uk; style-src 'self' 'unsafe-inline' maxcdn.bootstrapcdn.com nationalarchives.gov.uk *.nationalarchives.gov.uk fonts.googleapis.com; img-src 'self' data: nationalarchives.gov.uk *.nationalarchives.gov.uk;";

        proxy_intercept_errors          on;
        proxy_buffering                 off;
        proxy_buffer_size               4k;
        proxy_http_version              1.1;
        proxy_redirect                  off;

        proxy_headers_hash_max_size     2048;
        proxy_headers_hash_bucket_size  256;

        proxy_pass_request_headers  on;
        proxy_pass_request_body     on;

        proxy_set_header Host                   $proxy_host;
        proxy_set_header X-Forwarded-For        $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP              $remote_addr;
        proxy_set_header X-Forwarded-Host       $host;
        proxy_set_header X-Forwarded-Proto      $scheme;

        proxy_set_header HTTP_X_FORWARDED_PROTO  $scheme;
        proxy_set_header HTTP_X_FORWARDED_HOST  $host;
        proxy_set_header x-host-type            "public";
        proxy_set_header X-NginX-Proxy          true;
        proxy_set_header Accept-Encoding        "";

        # ----------------------------------------------------------------------
        # allow includes
        # ----------------------------------------------------------------------
        ssi on;
        ssi_last_modified on;

        # start with
        index index.php default.htm default.html index.htm index.html;

        # ----------------------------------------------------------------------
        # nginx tries to resolve any proxy_pass when starting up;
        # if only a single one fails the reverse proxy won't start;
        # to avoid this the proxy_pass values are variables and nginx resolves
        # them when requested; this has a slight performance impact as the DNS
        # resolving results aren't cached;

        # define upstream variables

        include variables.conf;

        # ----------------------------------------------------------------------
        # text replacement to allow the content being used across environments
        sub_filter_once off;

        sub_filter http://$base_kbs  http://$base_url/book-a-reading-room-visit;
        sub_filter https://$base_kbs https://$base_url/book-a-reading-room-visit;

        sub_filter http://$base_lone  http://$base_url/letter-of-no-evidence;
        sub_filter https://$base_lone https://$base_url/letter-of-no-evidence;

        sub_filter livelb.nationalarchives.gov.uk   https://$base_url;
        sub_filter http://${ups_legacy_apps}        https://$base_url;
        sub_filter https://${ups_legacy_apps}       https://$base_url;

        sub_filter http://appslb.nationalarchives.gov.uk    https://$base_url;
        sub_filter https://appslb.nationalarchives.gov.uk   https://$base_url;

        sub_filter http://${ups_appslb} https://$base_url;
        sub_filter https://${ups_appslb} https://$base_url;
        sub_filter ${ups_appslb} $base_url;

        # subs_filter_types application/rss+xml application/xml text/xml;
        # Note the above filter had to be scaled back because of pronom issues with a rewritten xml definition
        # Consider adding an exclusion where the url is preceded by: xmlns=
        subs_filter_types application/rss+xml;

        subs_filter (https?:)(\/\/|\\\/\\\/)([-a-zA-Z0-9]*)(\.${environment}lb\.nationalarchives\.gov\.uk) https://$base_url gir;

        # urls with subdomain - [subdomain].website.[env].local
        subs_filter (https?:)(\/\/|\\\/\\\/)([-a-zA-Z0-9]*)(\.website\.${environment}\.local) https://$base_url gir;

        # urls  - website.[env].local
        subs_filter (https?:)(\/\/|\\\/\\\/)(website\.${environment}\.local) https://$base_url gir;

        # urls  - website.[env].local without https?: (eg in references to XSL stylesheets)
        subs_filter (\/\/|\\\/\\\/)(website\.${environment}\.local) //$base_url gir;

        # urls  - web-frontend.[env].local without https?: (eg in references to XSL stylesheets)
        subs_filter (\/\/|\\\/\\\/)(web-frontend\.${environment}\.local) //$base_url gir;

        # urls  - web-enrichment.[env].local without https?: (eg in references to XSL stylesheets)
        subs_filter (\/\/|\\\/\\\/)(web-enrichment\.${environment}\.local) //$base_url gir;

         # urls with subdomain - [subdomain].[env]wp.nationalarchives.gov.uk
        subs_filter (https?:)(\/\/|\\\/\\\/)([-a-zA-Z0-9]*)(\.${environment}wp\.nationalarchives\.gov\.uk) https://$base_url gir;

        # urls - [env]wp.nationalarchives.gov.uk
        subs_filter (https?:)(\/\/|\\\/\\\/)(${environment}wp\.nationalarchives\.gov\.uk) https://$base_url gir;

        # urls - nationalarchives.gov.uk
        subs_filter (https?:)(\/\/|\\\/\\\/)(((${environment}-)?www\.)?nationalarchives\.gov\.uk\/jubilee\/platinum-jubilee-gallery) https://$base_url/jubilee/gallery gir;
        subs_filter (https?:)(\/\/|\\\/\\\/)(((${environment}-)?www\.)?nationalarchives\.gov\.uk\/platinum-jubilee) https://$base_url/jubilee gir;
        subs_filter (https?:)(\/\/|\\\/\\\/)(((${environment}-)?www\.)?nationalarchives\.gov\.uk\/treason-people-power-plot-season) https://$base_url/treason gir;
        subs_filter (https?:)(\/\/|\\\/\\\/)(((${environment}-)?www\.)?nationalarchives\.gov\.uk\/outreach\/five-photos) https://$base_url/education/outreach/five-photos gir;

        # urls - www.nationalarchives.gov.uk
        subs_filter (https?:)(\/\/|\\\/\\\/)(www\.nationalarchives\.gov\.uk) https://$base_url gir;

        # urls - nationalarchives.gov.uk
        subs_filter (https?:)(\/\/|\\\/\\\/)(nationalarchives\.gov\.uk) https://$base_url gir;

        # urls - from platform.sh
        #subs_filter (https?:)(\/\/|\\\/\\\/)(beta\.nationalarchives\.gov\.uk) https://$base_url gir;
        #subs_filter (https?:)(\/\/|\\\/\\\/)(develop-sr3snxi-rasrzs7pi6sd4.uk-1\.platformsh\.site) https://$base_url gir;

        # replace ancestry links when on-prem
        # replace ancestry links when on-prem
        if ($onprem = "yes") {
            set $ancestry_location "https://www.ancestryinstitution.co.uk/login?destination=https://www.ancestryinstitution.co.uk";
        }
        if ($onprem = "no") {
            set $ancestry_location "https://www.ancestry.co.uk";
        }
        subs_filter (https?:\/\/)([^.]*\.)?(ancestry\.co\.uk\/)([^"]*) $ancestry_location/$4 gir;

        # ----------------------------------------------------------------------
        # The main sitemap (frontend service)
        location = /sitemap.xml {
            proxy_set_header Host $host;
            proxy_set_header x-target "web-frontend";
            proxy_pass $ups_web_frontend/sitemap.xml$is_args$args;
        }

        # Child sitemaps root redirect (frontend service)
        location = /sitemaps {
            rewrite ^([^.]*[^/])$ $1/ permanent;
        }

        # Child sitemaps (frontend service)
        location ~* ^/sitemaps/(.*)$ {
            proxy_set_header Host $host;
            proxy_set_header x-target "web-frontend";
            proxy_pass $ups_web_frontend/sitemaps/$1$is_args$args;
        }

        # The sitemap index (WordPress Yoast)
        location = /sitemap_index.xml {
            subs_filter_types text/xml;
            subs_filter (https?:)(\/\/|\\\/\\\/)(website\.${environment}\.local) https://$base_url gir;
            subs_filter (href=\")(\/\/|\\\/\\\/)(website\.${environment}\.local) href=\"//$base_url gir;
            proxy_pass $ups_wp/$request_uri;
        }

        # Child sitemaps (WordPress Yoast)
        location ~* -sitemap(.*).xml {

            subs_filter_types text/xml;
            subs_filter (https?:)(\/\/|\\\/\\\/)(website\.${environment}\.local) https://$base_url gir;
            subs_filter (href=\")(\/\/|\\\/\\\/)(website\.${environment}\.local) href=\"//$base_url gir;
            proxy_pass $ups_wp/$request_uri;

        }


        # ----------------------------------------------------------------------
        # following wordpress internal redirects
        # ----------------------------------------------------------------------
        location @wp_redirect {
            set $saved_redirect_location '$upstream_http_location';
            proxy_pass $saved_redirect_location;
        }

        # ----------------------------------------------------------------------

        # ----------------------------------------------------------------------
        # error pages
        # ----------------------------------------------------------------------
        error_page 400 /error/400/;
        error_page 401 /error/401/;
        error_page 403 /error/403/;
        error_page 404 /error/404/;
        error_page 405 /error/405/;
        error_page 406 /error/406/;
        error_page 407 /error/407/;
        error_page 410 /error/410/;
        error_page 414 /error/414/;
        error_page 429 /error/429/;
        error_page 451 /error/451/;
        error_page 500 /error/500/;
        error_page 502 /error/502/;
        error_page 503 /error/503/;
        error_page 504 /error/504/;
        
        location /error {
            internal;
        }

        location = /error/400/ {
            proxy_intercept_errors off;
            proxy_pass $ups_web_frontend/error/400/;
        }

        location = /error/401/ {
            proxy_intercept_errors off;
            proxy_pass $ups_web_frontend/error/401/;
        }

        location = /error/403/ {
            proxy_intercept_errors off;
            proxy_pass $ups_web_frontend/error/403/;
        }

        location = /error/404/ {
            proxy_intercept_errors off;
            proxy_pass $ups_web_frontend/error/404/;
        }

        location = /error/405/ {
            proxy_intercept_errors off;
            proxy_pass $ups_web_frontend/error/405/;
        }

        location = /error/406/ {
            proxy_intercept_errors off;
            proxy_pass $ups_web_frontend/error/406/;
        }

        location = /error/407/ {
            proxy_intercept_errors off;
            proxy_pass $ups_web_frontend/error/407/;
        }

        location = /error/410/ {
            proxy_intercept_errors off;
            proxy_pass $ups_web_frontend/error/410/;
        }

        location = /error/414/ {
            proxy_intercept_errors off;
            proxy_pass $ups_web_frontend/error/414/;
        }

        location = /error/429/ {
            proxy_intercept_errors off;
            proxy_pass $ups_web_frontend/error/429/;
        }

        location = /error/451/ {
            proxy_intercept_errors off;
            proxy_pass $ups_web_frontend/error/451/;
        }

        location = /error/500/ {
            proxy_intercept_errors off;
            proxy_pass $ups_web_frontend/error/500/;
        }

        location = /error/502/ {
            proxy_intercept_errors off;
            proxy_pass $ups_web_frontend/error/502/;
        }

        location = /error/503/ {
            proxy_intercept_errors off;
            proxy_pass $ups_web_frontend/error/503/;
        }

        location = /error/504/ {
            proxy_intercept_errors off;
            proxy_pass $ups_web_frontend/error/504/;
        }
        # ----------------------------------------------------------------------

        # ----------------------------------------------------------------------
        # return 404 error for /tag/(.*) to prevent Wordpress handling this
        # ----------------------------------------------------------------------
        location /tag/ {
            return 404;
        }
        
        location = /community-hub {
           rewrite ^([^.]*[^/])$ $1/ permanent;
        }
        location ~* ^/community-hub/(.*)$ {
            proxy_pass $ups_portals/community-hub/$1$is_args$args;
        }

        location = /coronations {
            rewrite ^([^.]*[^/])$ $1/ permanent;
        }

        location = /coronations/historical-coronations-highlights {
            rewrite ^([^.]*[^/])$ $1/ permanent;
        }

        location ~* ^/coronations/historical-coronations-highlights/(.*)$ {
            proxy_pass $ups_wp/coronations/historical-coronations-highlights/$1$is_args$args;
        }

        location ~* ^/coronations/(.*)$ {
            proxy_pass $ups_portals/coronations/$1$is_args$args;
        }

        location = /global-second-world-war {
            rewrite ^([^.]*[^/])$ $1/ permanent;
        }

        location ~* ^/global-second-world-war/(.*)$ {
            proxy_pass $ups_portals/global-second-world-war/$1$is_args$args;
        }


        location = /eurovision-2023 {
            rewrite ^([^.]*[^/])$ $1/ permanent;
        }

        location ~* ^/eurovision-2023/(.*)$ {
            proxy_pass $ups_archives_sector/eurovision-2023/$1$is_args$args;
        }

        location = /jubilee {
            rewrite ^([^.]*[^/])$ $1/ permanent;
        }

        location ~* ^/jubilee/gallery/(.*)$ {
            proxy_pass $ups_wp/jubilee/platinum-jubilee-gallery/$1$is_args$args;
        }

        location ~* ^/jubilee/(.*)$ {
            proxy_pass $ups_portals/platinum-jubilee/$1$is_args$args;
        }

        rewrite ^/platinum-jubilee/(.*)$                    /jubilee/$1$is_args$args permanent;
        rewrite ^/jubilee/platinum-jubilee-gallery/(.*)$    /jubilee/gallery/$1$is_args$args permanent;

        location = /windrush-75 {
            rewrite ^([^.]*[^/])$ $1/ permanent;
        }

        location ~* ^/windrush-75/(.*)$ {
            proxy_pass $ups_portals/windrush-75/$1$is_args$args;
        }

        location = /ministry-of-time-travel {
            rewrite ^([^.]*[^/])$ $1/ permanent;
        }

        location ~* ^/ministry-of-time-travel/(.*)$ {
            proxy_pass $ups_portals/ministry-of-time-travel/$1$is_args$args;
        }

        location = /spirit-of-invention {
            rewrite ^([^.]*[^/])$ $1/ permanent;
        }

        location ~* ^/spirit-of-invention/(.*)$ {
            proxy_pass $ups_portals/spirit-of-invention/$1$is_args$args;
        }

        location = /treason {
            rewrite ^([^.]*[^/])$ $1/ permanent;
        }

        location ~* ^/treason/(.*)$ {
            proxy_pass $ups_portals/treason-people-power-plot-season/$1$is_args$args;
        }

        rewrite ^/treason-people-power-plot-season/(.*)$                    /treason/$1$is_args$args permanent;

        location = /northern-ireland-pathways-peace-reconciliation {
            rewrite ^([^.]*[^/])$ $1/ permanent;
        }

        location ~* ^/northern-ireland-pathways-peace-reconciliation/key-documents/(.*)$ {
            proxy_pass $ups_wp/northern-ireland-pathways-peace-reconciliation/key-documents/$1$is_args$args;
        }

        location ~* ^/northern-ireland-pathways-peace-reconciliation/(.*)$ {
            proxy_pass $ups_portals/northern-ireland-pathways-peace-reconciliation/$1$is_args$args;
        }

        location = /nhs-75 {
            rewrite ^([^.]*[^/])$ $1/ permanent;
        }

        location ~* ^/nhs-75/(.*)$ {
            proxy_pass $ups_portals/nhs-75/$1$is_args$args;
        }

        location = ^/about/our-role/plans-policies-performance-and-projects/our-plans/archives-for-everyone {
            rewrite ^([^.]*[^/])$ $1/ permanent;
        }

        location ~* ^/about/our-role/plans-policies-performance-and-projects/our-plans/archives-for-everyone/(.*)$ {
            proxy_pass $ups_portals/archives-for-everyone/$1$is_args$args;
            subs_filter (https?:)(\/\/|\\\/\\\/)([-a-zA-Z0-9]*)(\.${environment}wp\.nationalarchives\.gov\.uk) https://$base_url gir;
            subs_filter \"(\/archives-for-everyone\/[^\"]*)\"  \"/about/our-role/plans-policies-performance-and-projects/our-plans$1\" gir;
        }

        # ----------------------------------------------------------------------
        # legacy - hard rewrites
        # ----------------------------------------------------------------------
        rewrite ^/bookshop/details.aspx(.*)$                $ups_bookshop$1$is_args$args permanent;
        rewrite ^/jsp/(.*)$                                 $ups_worldpay/jsp/$1$is_args$args permanent;
        # rewrite ^(/documents/.*)$                           $ups_cdn$1 permanent;
        # ----------------------------------------------------------------------

        location ~* /documents/(.*)$ {
            rewrite ^(/documents/.*)$                           $ups_cdn$1 permanent;
        }
        location = /documents/executive-team-meeting-minutes-2021-04.pdf {}


        location ^~ /contact/contactform.asp {
            if ($args ~* "id=1") {
                return 301 $ups_www/contact-us/;
            }
            if ($args ~* "id=2") {
                return 301 $ups_bookshop/FAQ/;
            }
            if ($args ~* "id=4") {
                return 301 $ups_www/help-with-your-research/record-copying/;
            }
            if ($args ~* "id=5") {
                return 301 $ups_www/contact-us/document-condition-feedback/;
            }
            if ($args ~* "id=6") {
                return 301 $ups_www/contact-us/;
            }
            if ($args ~* "id=7") {
                return 301 $ups_www/contact-us/request-a-search-for-a-certificate-of-british-citizenship-1949-1986/;
            }
            if ($args ~* "id=8") {
                return 301 $ups_www/contact-us/public-sector-information-enquiry/;
            }
            if ($args ~* "id=9") {
                return 301 $ups_www/contact-us/your-views/;
            }
            if ($args ~* "id=10") {
                return 301 $ups_www/contact-us/make-a-freedom-of-information-enquiry/;
            }
            if ($args ~* "id=13") {
                return 301 $ups_www/contact-us/submit-information-for-pronom/;
            }
            if ($args ~* "id=16") {
                return 301 $ups_www/contact-us/apply-to-film-at-the-national-archives/;
            }
            if ($args ~* "id=19") {
                return 301 $ups_www/contact-us/information-assurance-and-cyber-security-training/;
            }
            if ($args ~* "id=20") {
                return 301 $ups_www/about/our-role/collection-care/lending-to-exhibitions/;
            }
            if ($args ~* "id=21") {
                return 301 $ups_www/contact-us/update-or-add-an-archive/;
            }
            if ($args ~* "id=22") {
                return 301 $ups_www/contact-us/make-a-records-and-research-enquiry/;
            }
            if ($args ~* "id=23") {
                return 301 $ups_www/help-with-your-research/paying-for-research/our-paid-search-service/;
            }
        }
        # ----------------------------------------------------------------------
        # legacy - e-commerce
        # ----------------------------------------------------------------------
        location = /e179 {
            rewrite ^([^.]*[^/])$ $1/ permanent;
        }
        location ~* ^/e179/(.*)$ {
            proxy_set_header Accept-Encoding "";
            proxy_set_header Host $ups_win2016apps_host;
            proxy_pass $ups_win2016apps/e179/$1$is_args$args;
            subs_filter http:\/\/(test|prod)-apps\.nationalarchives\.gov\.uk https://$base_url gir;
        }
        location ~* ^/infoservice/(.*)$ {
            proxy_set_header Host $ups_win2016apps_host;
            proxy_pass $ups_win2016apps/infoservice/$1$is_args$args;
        }
        location ~* ^/streamlineHPP/(.*)$ {
            %{ for ip in streamline_access_list ~}
            allow ${ip};
            %{ endfor ~}
            deny all;

            proxy_set_header Host $ups_win2016apps_host;
            proxy_pass $ups_win2016apps/streamlineHPP/$1$is_args$args;
        }
        location = /shop {
            return 301 $ups_bookshop;
        }

        location = /trafalgarancestors {
            rewrite ^([^.]*[^/])$ $1/ permanent;
        }
        location ~* ^/trafalgarancestors/(.*)$ {
            proxy_set_header Accept-Encoding "";
            proxy_set_header Host $ups_win2016apps_host;
            proxy_pass $ups_win2016apps/trafalgarancestors/$1$is_args$args;
            subs_filter http:\/\/(test|prod)-apps\.nationalarchives\.gov\.uk https://$base_url gir;
        }
        # ----------------------------------------------------------------------

        # ----------------------------------------------------------------------
        # health check
        # ----------------------------------------------------------------------
        location ^~ /rp-beacon {
            access_log off;
            add_header Content-Type text/plain;
            return 200 'RP: I\'m in good health';
        }
        # ----------------------------------------------------------------------
        # local file handling and if not in location, reverse proxy or rewrite
        # ----------------------------------------------------------------------
        location / {
            try_files $uri $uri/ @notlocal;
        }
        location = /default.htm {
            proxy_pass $ups_tna_home/;
        }
        location @notlocal {
            proxy_pass $ups_wp$request_uri;
        }
        # ----------------------------------------------------------------------

        # ----------------------------------------------------------------------
        # restrict public access to wordpress dashboard and other section/files
        # ----------------------------------------------------------------------
        location ~* /xmlrpc.php(.*)$ {
            deny all;
        }
        location ~* ^\/([-a-z]*\/)?wp-(admin|login\.php|admin\.*|json\.*|cron\.php) {
            deny all;
        }
        location ~* /editorial/.*$ {
            deny all;
        }

        # ----------------------------------------------------------------------

        # ----------------------------------------------------------------------
        # block public access to non-public files/folders
        # ----------------------------------------------------------------------
        location ~ /\.(git|zzz) {
            deny all;
        }

        location ~ /web\.config {
            deny all;
        }
        # ----------------------------------------------------------------------

        # ----------------------------------------------------------------------
        # the order of location ~* is important for regex evaluation;
        # if a match is found any further processing is terminated and the
        # related proxy_pass is executed;
        # ----------------------------------------------------------------------

        # ----------------------------------------------------------------------
        # a2a - discovery
        # ----------------------------------------------------------------------
        location = /a2a {
            return 301 $ups_discovery$is_args$args;
        }

        location ^~ /a2a/records.aspx {
            set $argList "";
            if ($args ~* "cat=") {
                set $argList "$${argList}A";
            }
            if ($args ~* "cat%3D") {
                set $argList "$${argList}A";
            }
            if ($args ~* "cid=") {
                set $argList "$${argList}B";
            }
            if ($args ~* "cid%3D") {
                set $argList "$${argList}B";
            }
            if ($argList = "A") {
                return 301 $ups_discovery/redirect/a2a/?cat=$arg_cat&cid=0;
            }
            if ($argList = "AB") {
                return 301 $ups_discovery/redirect/a2a/$is_args$args;
            }
        }

        location ^~ /a2a/advanced-search.aspx {
            if ($args ~* "containallwords=") {
                return 301 $ups_discovery/results/r?_q=$arg_containallwords&_hb=oth;
            }
        }

        location ^~ /a2a/results.aspx {
            set $argList "";
            if ($args ~* "containallwords=") {
                set $argList "$${argList}C";
            }
            if ($args ~* "containanywords=") {
                set $argList "$${argList}D";
            }
            if ($args ~* "repository=") {
                set $argList "$${argList}E";
            }
            if ($args ~* "catalog=") {
                set $argList "$${argList}F";
            }
            if ($args ~* "exactphrase=") {
                set $argList "$${argList}G";
            }
            if ($args ~* "places=") {
                set $argList "$${argList}G";
            }

            if ($argList = "C") {
                return 301 $ups_discovery/results/r?_q=$arg_containallwords&_hb=oth;
            }
            if ($argList = "CDEF") {
                return 301 $ups_discovery/results/r?_q=$arg_containallwords+$arg_containanywords+AND+"$${arg_repository}"+AND+"$${arg_catalog}"&_hb=oth;
            }
            if ($argList = "CDE") {
                return 301 $ups_discovery/results/r?_q=$arg_containallwords+$arg_containanywords+AND+"$${arg_repository}"&_hb=oth;
            }
            if ($argList = "CEG") {
                return 301 $ups_discovery/results/r?_q=$arg_containallwords+AND+"$${arg_exactphrase}"+AND+"$${arg_repository}"&_hb=oth;
            }
            if ($argList = "CG") {
                return 301 $ups_discovery/results/r?_q=$arg_containallwords+AND+"$${arg_repository}"&_hb=oth;
            }
            if ($argList = "CEF") {
                return 301 $ups_discovery/results/r?_q=$arg_containallwords+AND+"$${arg_repository}"+AND+"$${arg_catalog}"&_hb=oth;
            }
            if ($argList = "CE") {
                return 301 $ups_discovery/results/r?_q=$arg_containallwords+AND+"$${arg_repository}"&_hb=oth;
            }
            if ($argList = "CG") {
                return 301 $ups_discovery/results/r?_q=$arg_containallwords+AND+arg_places&_hb=oth;
            }
            if ($argList = "G") {
                return 301 $ups_discovery/results/r?_q="$${arg_exactphrase}"&_hb=oth;
            }
        }

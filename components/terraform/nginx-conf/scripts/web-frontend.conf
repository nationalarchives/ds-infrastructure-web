# ----------------------------------------------------------------------
# reverse proxy to web-frontend assets
# ----------------------------------------------------------------------
        location ~* ^/static/(.*)$ {
            expires 1y;
            access_log off;
            proxy_set_header x-target "web-frontend";
            proxy_pass $ups_web_frontend/static/$1$is_args$args;
        }

        location ~* ^/preview/(.*)$ {
            proxy_set_header Host $host;
            proxy_set_header x-target "web-frontend";
            proxy_pass $ups_web_frontend/preview/$1$is_args$args;
        }

        location ~* ^/page/(.*)$ {
            proxy_set_header Host $host;
            proxy_set_header x-target "web-frontend";
            proxy_pass $ups_web_frontend/page/$1$is_args$args;
        }

        location = / {
            proxy_set_header Host $host;
            proxy_set_header x-target "web-frontend";
            proxy_pass $ups_web_frontend/$is_args$args;
        }

        location = /robots.txt {
            proxy_set_header Host $host;
            proxy_set_header x-target "web-frontend";
            proxy_pass $ups_web_frontend/robots.txt$is_args$args;
        }

        location ~* ^/.well-known/(.*)$ {
            proxy_set_header Host $host;
            proxy_set_header x-target "web-frontend";
            proxy_pass $ups_web_frontend/.well-known/$1$is_args$args;
        }

        location = /maintenance {
            rewrite ^([^.]*[^/])$ $1/ permanent;
        }
        location ~* ^/maintenance/(.*)$ {
            proxy_set_header Host $host;

# Web Forms Locations

    location ~* ^/forms/static/(.*)$ {
        expires 1y;
        access_log off;
        proxy_set_header x-target "web-forms";
        proxy_pass $ups_web_forms/forms/static/$1$is_args$args;
    }
    location ~* ^/forms/(.*)$ {
        proxy_set_header Host $host;
        proxy_intercept_errors off;
        proxy_set_header x-target "web-forms";
        proxy_pass $ups_web_forms/forms/$1$is_args$args;
    }
    
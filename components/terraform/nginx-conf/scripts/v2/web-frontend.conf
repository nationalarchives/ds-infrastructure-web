            proxy_pass $ups_web_frontend/explore-the-collection/$1$is_args$args;
        }

        # remove /blog redirects after Decemer 2025
        location = /blog {
            return 301 $ups_www/blogs/;
        }
        location = /blog/ {
            return 301 $ups_www/blogs/;
        }

# ----------------------------------------------------------------------
# reverse proxy to web-frontend assets
# ----------------------------------------------------------------------
        location ~* ^/static/(.*)$ {
            expires 1y;
            access_log off;
            proxy_set_header x-target "web-frontend";
            proxy_pass $ups_web_frontend/static/$1$is_args$args;
        }

        # Deny direct access to documents uploaded to Wagtail (links shown on the website go through /wagtail-documents/ which has access control in Wagtail)
        location ^~ /media/documents/ {
            deny all;
        }

        # Deny direct access to original images uploaded to Wagtail (these are used for image renditions and should not be accessed directly)
        location ^~ /media/original_images/ {
            deny all;
        }

        location ~* ^/media/(.*)$ {
            expires 1y;
            access_log off;
            try_files $uri $uri/ @notlocalmedia;
        }

        location @notlocalmedia {
            expires 1y;
            access_log off;
            proxy_set_header x-target "web-wagtail";
            proxy_pass $ups_web_wagtail/media/$1$is_args$args;
        }

        location ~* ^/wagtail-documents/(.*)$ {
            expires 1y;
            access_log off;
            proxy_set_header Host $host;
            proxy_intercept_errors off;
            proxy_set_header x-target "web-wagtail";
            proxy_pass $ups_web_wagtail/wagtail-documents/$1$is_args$args;
        }

        location ~* ^/preview/(.*)$ {
            proxy_set_header Host $host;
            proxy_intercept_errors off;
            proxy_set_header x-target "web-frontend";
            proxy_pass $ups_web_frontend/preview/$1$is_args$args;
        }

        location ~* ^/page/(.*)$ {
            proxy_set_header Host $host;
            proxy_intercept_errors off;
            proxy_set_header x-target "web-frontend";
            proxy_pass $ups_web_frontend/page/$1$is_args$args;
        }

        location = / {
            proxy_set_header Host $host;
            proxy_intercept_errors off;
            proxy_set_header x-target "web-frontend";
            proxy_pass $ups_web_frontend/$is_args$args;
        }

        location = /maintenance {
            rewrite ^([^.]*[^/])$ $1/ permanent;
        }
        location ~* ^/maintenance/(.*)$ {
            proxy_intercept_errors off;
            proxy_set_header Host $host;
            proxy_set_header x-target "web-frontend";
            proxy_pass $ups_web_frontend/maintenance/$1$is_args$args;

# Web Forms Nginx configuration
server {
        listen        80;
        server_name     %{ if environment == "live" }www.nationalarchives.gov.uk nationalarchives.gov.uk%{ else }${environment}-www.nationalarchives.gov.uk%{ endif };

        server_tokens off;

        set_real_ip_from ${set_real_ip_from};
        real_ip_header X-Forwarded-For;
        real_ip_recursive on;

        include cloudfront_ips.conf;
        include variables.conf;
        
        root /var/nationalarchives.gov.uk;  # aws efs
        client_max_body_size 200M;

        add_header X-Robots-Tag        "noindex, nofollow, nosnippet, noarchive";

        proxy_intercept_errors         off;
        proxy_buffering                off;
        proxy_buffer_size              4k;
        proxy_http_version             1.1;

        proxy_headers_hash_max_size    2048;
        proxy_headers_hash_bucket_size 256;

        proxy_pass_request_headers     on;
        proxy_pass_request_body        on;

        proxy_set_header Host          $host;
        
        proxy_set_header X-Forwarded-For        $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP              $remote_addr;
        proxy_set_header X-Forwarded-Host       $host;
        proxy_set_header X-Forwarded-Proto      $scheme;
        proxy_set_header HTTP_X_FORWARDED_PROTO $scheme;
        proxy_set_header HTTP_X_FORWARDED_HOST  $host;
        proxy_set_header X_HOST_TYPE            "public";
        proxy_set_header X-NginX-Proxy          true;
        proxy_set_header Accept-Encoding        "";
        # === Review end

        ssi on;
        ssi_last_modified on;

        sub_filter_once off;
        subs_filter_types *;
        subs_filter (\/\/|\\\/\\\/)(web-forms\.${environment}\.local) //$base_url gir;

        set $web_forms_uri     web-forms.${environment}.local;
        set $ups_web_forms     http://$web_forms_uri;

        location = /forms {
                rewrite ^([^.]*[^/])$ $1/ permanent;
        }
        location ~* ^/forms/(.*)$ {
            expires 1y;
            access_log off;
            proxy_set_header x-target "web-forms";
            proxy_pass $ups_web_forms/forms/$1$is_args$args;
        }
        
    }

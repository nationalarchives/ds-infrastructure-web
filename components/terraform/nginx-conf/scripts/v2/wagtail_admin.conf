# wagtail admin server
server {
        listen        80;
        server_name %{ if environment == "live" }wagtail.nationalarchives.gov.uk%{ else }${environment}-wagtail.nationalarchives.gov.uk%{ endif };

        server_tokens off;
        
        access_log   /var/log/nginx/wagtail-access.log main;
        error_log    /var/log/nginx/wagtail-error.log;

        set_real_ip_from ${set_real_ip_from};
        real_ip_header X-Forwarded-For;
        real_ip_recursive on;

        include cloudfront_ips.conf;
        include /etc/nginx/whitelist.conf;
        include variables.conf;
        
        root /var/nationalarchives.gov.uk;  # aws efs
        client_max_body_size 200M;

        add_header X-Robots-Tag        "noindex, nofollow, nosnippet, noarchive";

        proxy_intercept_errors         off;
        proxy_buffering                off;
        proxy_buffer_size              4k;
        proxy_http_version             1.1;

        proxy_headers_hash_max_size    2048;
        proxy_headers_hash_bucket_size 256;

        proxy_pass_request_headers     on;
        proxy_pass_request_body        on;

        proxy_set_header Host          $host;
        # === TODO: Review start
        proxy_set_header X-Forwarded-For        $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP              $remote_addr;
        proxy_set_header X-Forwarded-Host       $host;
        proxy_set_header X-Forwarded-Proto      $scheme;
        proxy_set_header HTTP_X_FORWARDED_PROTO $scheme;
        proxy_set_header HTTP_X_FORWARDED_HOST  $host;
        proxy_set_header X_HOST_TYPE            "public";
        proxy_set_header X-NginX-Proxy          true;
        proxy_set_header Accept-Encoding        "";
        # === Review end

        proxy_redirect $ups_web_wagtail/    https://$wagtail_base_url/;
        proxy_redirect $ups_web_wagtaildocs/   https://$wagtail_base_url/;

        ssi on;
        ssi_last_modified on;

        # sub_filter_once off;
        # subs_filter_types *;
        # subs_filter (\/\/|\\\/\\\/)(web-wagtail\.${environment}\.local) //$base_url gir;
        # subs_filter (\/\/|\\\/\\\/)(web-wagtaildocs\.${environment}\.local) //$base_url gir;

        set $base_url   %{ if environment == "live" }wagtail.nationalarchives.gov.uk%{ else }${environment}-wagtail.nationalarchives.gov.uk%{ endif };
        set $web_wagtail_uri     web-wagtail.${environment}.local;
        set $ups_web_wagtail     http://$web_wagtail_uri;

        set $web_wagtaildocs_uri   web-wagtaildocs.${environment}.local;
        set $ups_web_wagtaildocs   http://$web_wagtaildocs_uri;

        location ^~ /media/documents/ {
            deny all;
        }

        location ~* ^/media/(.*)$ {
            try_files $uri $uri/ @notlocalmedia;
        }

        location @notlocalmedia {
            proxy_set_header x-target "web-wagtail";
            proxy_pass $ups_web_wagtail/media/$1$is_args$args;
        }

        location /admin {
            proxy_set_header x-target "web-wagtail";
            proxy_pass $ups_web_wagtail;
        }

        location /api {
            proxy_set_header x-target "web-wagtail";
            proxy_pass $ups_web_wagtail;
            allow all;
        }

        location /wagtail-static {
            proxy_set_header x-target "web-wagtail";
            proxy_pass $ups_web_wagtail;
            allow all;
        }

        location ~* ^/wagtail-documents/(.*)$ {
            return 301 https://%{ if environment == "live" }www%{ else }${environment}-www%{ endif }.nationalarchives.gov.uk/wagtail-documents/$1$is_args$args;
        }
        
        location / {
            proxy_set_header x-target "web-wagtaildocs";
            proxy_pass $ups_web_wagtaildocs;
        }
    }
